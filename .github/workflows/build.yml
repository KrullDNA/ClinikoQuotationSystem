name: Build Installers

on:
  push:
    branches: [main, claude/*]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: fif-quote-generator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fif-quote-generator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Windows installer
        run: npx electron-builder --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            fif-quote-generator/dist/*.exe
          retention-days: 30

  build-mac:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: fif-quote-generator

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fif-quote-generator/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build renderer
        run: npm run build:renderer

      - name: Build Mac DMG
        run: npx electron-builder --mac
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Mac installer
        uses: actions/upload-artifact@v4
        with:
          name: mac-installer
          path: |
            fif-quote-generator/dist/*.dmg
          retention-days: 30
